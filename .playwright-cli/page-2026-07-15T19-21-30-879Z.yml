        - heading "AI Agent 应用的第一条工程原则" [level=1] [ref=e23]
        - paragraph [ref=e24]: 在追求自主性之前，先让系统的边界、状态与失败变得可观察。
        - generic [ref=e25]:
          - time [ref=e26]: 2026年7月15日
          - generic [ref=e27]: 2 分钟阅读
        - generic [ref=e28]:
          - link "AI Agent" [ref=e29] [cursor=pointer]:
