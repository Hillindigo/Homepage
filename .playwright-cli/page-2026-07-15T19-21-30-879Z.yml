          - link "软件工程" [ref=e30] [cursor=pointer]:
            - /url: /Homepage/zh/tags/%E8%BD%AF%E4%BB%B6%E5%B7%A5%E7%A8%8B/
      - generic [ref=e31]:
        - complementary [ref=e32]:
          - paragraph [ref=e33]: 目录
          - navigation [ref=e34]:
            - link "从可观察性开始" [ref=e35] [cursor=pointer]:
              - /url: "#从可观察性开始"
            - link "明确失败语义" [ref=e36] [cursor=pointer]:
              - /url: "#明确失败语义"
            - link "自主性应当逐级开放" [ref=e37] [cursor=pointer]:
              - /url: "#自主性应当逐级开放"
        - generic [ref=e38]:
          - paragraph [ref=e39]: 一个 Agent 能够调用更多工具、执行更长任务，并不等于它更可靠。真正进入工程环境后，首先需要解决的不是“还能让它做什么”，而是“当它没有按预期工作时，我们能否准确知道发生了什么”。
          - heading [level=2] [ref=e40]:
            - text: 从可观察性开始
            - link "复制本节链接：从可观察性开始" [ref=e41] [cursor=pointer]:
              - /url: "#%E4%BB%8E%E5%8F%AF%E8%A7%82%E5%AF%9F%E6%80%A7%E5%BC%80%E5%A7%8B"
              - text: "#"
          - paragraph [ref=e42]: 至少记录四类信息：用户目标、模型决策、工具输入输出，以及最终状态。它们组成一次任务的完整轨迹。没有这条轨迹，调试只能依赖猜测。
          - generic [ref=e43]:
            - code [ref=e44]:
              - generic [ref=e45]: "type AgentTrace = {"
              - generic [ref=e46]: "goal: string;"
              - generic [ref=e47]: "steps: Array<{ tool: string; input: unknown; output: unknown }>;"
              - generic [ref=e48]: "status: 'completed' | 'failed' | 'needs_input';"
              - generic [ref=e49]: "};"
            - button "复制代码" [ref=e50] [cursor=pointer]
          - heading [level=2] [ref=e51]:
            - text: 明确失败语义
            - link "复制本节链接：明确失败语义" [ref=e52] [cursor=pointer]:
              - /url: "#%E6%98%8E%E7%A1%AE%E5%A4%B1%E8%B4%A5%E8%AF%AD%E4%B9%89"
              - text: "#"
          - paragraph [ref=e53]: “没有完成”可能意味着工具超时、权限不足、输入缺失，也可能只是模型选择了错误路径。系统应当把这些状态区分开，而不是统一返回一个模糊的错误。
          - heading [level=2] [ref=e54]:
            - text: 自主性应当逐级开放
            - link "复制本节链接：自主性应当逐级开放" [ref=e55] [cursor=pointer]:
              - /url: "#%E8%87%AA%E4%B8%BB%E6%80%A7%E5%BA%94%E5%BD%93%E9%80%90%E7%BA%A7%E5%BC%80%E6%94%BE"
              - text: "#"
          - paragraph [ref=e56]: 先让 Agent 在可回放、可中断、可确认的流程中工作，再逐步增加自主决策范围。每增加一层能力，都应同时增加对应的观测与约束。
          - paragraph [ref=e57]: 工程化的目标不是消除不确定性，而是让不确定性可以被发现、理解和处理。
